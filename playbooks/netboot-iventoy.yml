---
- name: PXE STACK (UNBOUND + NGINX + DNSMASQ + IVPENTOY)
  hosts: pxe_server
  become: true
  gather_facts: true

  vars:
    interface: "{{ ansible_default_ipv4.interface }}"
    server_ip: "{{ ansible_default_ipv4.address }}"
    gateway: "{{ ansible_default_ipv4.gateway }}"

    lan_cidr: 192.168.1.0/24
    dhcp_range_start: 192.168.1.100
    dhcp_range_end: 192.168.1.200

    tftp_root: /srv/tftp
    web_root: /var/www/html

    iventoy_dir: /opt/iventoy
    iventoy_url: https://github.com/ventoy/PXE/releases/latest/download/iventoy-linux-free.tar.gz
    netboot_url: https://boot.netboot.xyz/ipxe/netboot.xyz.kpxe

  tasks:

  # -------------------------
  # BASE PACKAGES
  # -------------------------
  - name: Install dependencies
    apt:
      name:
        - dnsmasq
        - unbound
        - nginx
        - wget
        - curl
        - tar
        - ufw
      state: present
      update_cache: yes
    retries: 5
    delay: 5

  # -------------------------
  # NETWORK / DNS FIX
  # -------------------------
  - name: Disable systemd-resolved
    systemd:
      name: systemd-resolved
      state: stopped
      enabled: false
    ignore_errors: true

  - name: Force resolv.conf to local DNS
    copy:
      dest: /etc/resolv.conf
      content: |
        nameserver 127.0.0.1

  # -------------------------
  # FIREWALL (CRITICAL)
  # -------------------------
  - name: Enable UFW
    ufw:
      state: enabled
      policy: allow

  - name: Allow PXE + DNS + HTTP ports
    ufw:
      rule: allow
      port: "{{ item }}"
      proto: any
    loop:
      - "53"
      - "67"
      - "69"
      - "80"
      - "26000"

  # -------------------------
  # UNBOUND DNS (HARDENED)
  # -------------------------
  - name: Configure Unbound
    copy:
      dest: /etc/unbound/unbound.conf.d/pxe.conf
      content: |
        server:
          interface: 127.0.0.1
          port: 53

          access-control: 127.0.0.0/8 allow
          access-control: {{ lan_cidr }} allow

          cache-size: 128m
          prefetch: yes

          hide-identity: yes
          hide-version: yes

        forward-zone:
          name: "."
          forward-addr: 9.9.9.9
          forward-addr: 149.112.112.112

  - name: Restart Unbound
    systemd:
      name: unbound
      state: restarted
      enabled: true

  # -------------------------
  # DNSMASQ (PXE + DHCP)
  # -------------------------
  - name: Configure dnsmasq PXE
    copy:
      dest: /etc/dnsmasq.conf
      content: |
        interface={{ interface }}
        bind-interfaces

        dhcp-range={{ dhcp_range_start }},{{ dhcp_range_end }},12h
        dhcp-option=3,{{ gateway }}

        # DNS via Unbound (LOCAL)
        dhcp-option=6,{{ server_ip }}

        enable-tftp
        tftp-root={{ tftp_root }}

        # PXE boot to Nginx script (NOT direct netboot)
        dhcp-boot=http://{{ server_ip }}/pxe.ipxe

  - name: Restart dnsmasq
    systemd:
      name: dnsmasq
      state: restarted
      enabled: true

  # -------------------------
  # TFTP + NETBOOT
  # -------------------------
  - name: Create TFTP directory
    file:
      path: "{{ tftp_root }}"
      state: directory

  - name: Download netboot.xyz
    get_url:
      url: "{{ netboot_url }}"
      dest: "{{ tftp_root }}/netboot.xyz.kpxe"
    retries: 5
    delay: 3

  # -------------------------
  # NGINX (PXE SAFE)
  # -------------------------
  - name: Create web root
    file:
      path: "{{ web_root }}"
      state: directory

  - name: Configure Nginx PXE site
    copy:
      dest: /etc/nginx/sites-available/pxe
      content: |
        server {
          listen 80;
          server_name _;

          root /var/www/html;

          index index.html pxe.ipxe;

          location / {
            autoindex on;
          }

          location ~* \.ipxe$ {
            default_type text/plain;
          }

          location ~* \.kpxe$ {
            default_type application/octet-stream;
          }
        }

  - name: Enable Nginx site
    file:
      src: /etc/nginx/sites-available/pxe
      dest: /etc/nginx/sites-enabled/pxe
      state: link

  - name: Remove default Nginx site
    file:
      path: /etc/nginx/sites-enabled/default
      state: absent

  - name: Restart Nginx
    systemd:
      name: nginx
      state: restarted
      enabled: true

  # -------------------------
  # PXE BOOT SCRIPT (ROBUST CHAIN)
  # -------------------------
  - name: Create PXE boot script
    copy:
      dest: "{{ web_root }}/pxe.ipxe"
      content: |
        #!ipxe
        dhcp
        set base http://{{ server_ip }}

        menu PXE Boot Menu
        item iventoy iVentoy ISO Boot
        item netboot Netboot.xyz
        choose target

        goto ${target}

        :iventoy
        chain http://{{ server_ip }}:26000/iventoy.ipxe

        :netboot
        chain http://boot.netboot.xyz/ipxe/netboot.xyz.kpxe

  # -------------------------
  # IVPENTOY INSTALL
  # -------------------------
  - name: Create iVentoy directory
    file:
      path: "{{ iventoy_dir }}"
      state: directory

  - name: Download iVentoy
    get_url:
      url: "{{ iventoy_url }}"
      dest: /tmp/iventoy.tar.gz
    retries: 5
    delay: 5

  - name: Extract iVentoy
    unarchive:
      src: /tmp/iventoy.tar.gz
      dest: /tmp/
      remote_src: yes

  - name: Copy iVentoy files
    copy:
      src: "{{ item }}"
      dest: "{{ iventoy_dir }}/"
      remote_src: yes
    with_fileglob:
      - "/tmp/iventoy-*/*"

  - name: Ensure iVentoy executable
    file:
      path: "{{ iventoy_dir }}/iventoy.sh"
      mode: "0755"

  - name: Create ISO directory
    file:
      path: "{{ iventoy_dir }}/iso"
      state: directory

  # -------------------------
  # IVPENTOY SERVICE
  # -------------------------
  - name: Create systemd service
    copy:
      dest: /etc/systemd/system/iventoy.service
      content: |
        [Unit]
        Description=iVentoy PXE Server
        After=network.target

        [Service]
        ExecStart={{ iventoy_dir }}/iventoy.sh start
        ExecStop={{ iventoy_dir }}/iventoy.sh stop
        Restart=always

        [Install]
        WantedBy=multi-user.target

  - name: Reload systemd
    command: systemctl daemon-reload

  - name: Start iVentoy
    systemd:
      name: iventoy
      state: started
      enabled: true

  # -------------------------
  # HEALTH CHECK
  # -------------------------
  - name: Wait for iVentoy UI
    uri:
      url: http://localhost:26000
      status_code: 200
    retries: 10
    delay: 3