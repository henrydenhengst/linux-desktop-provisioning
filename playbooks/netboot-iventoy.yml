---
- name: FULL PXE STACK + UNBOUND DNS
  hosts: pxe_server
  become: true
  gather_facts: true

  vars:
    interface: "{{ ansible_default_ipv4.interface }}"
    server_ip: "{{ ansible_default_ipv4.address }}"
    gateway: "{{ ansible_default_ipv4.gateway }}"

    dhcp_range_start: 192.168.1.100
    dhcp_range_end: 192.168.1.200

    tftp_root: /srv/tftp
    web_root: /var/www/html

    dns_lan_cidr: 192.168.1.0/24

    iventoy_dir: /opt/iventoy
    iventoy_url: https://github.com/ventoy/PXE/releases/latest/download/iventoy-linux-free.tar.gz
    netboot_url: https://boot.netboot.xyz/ipxe/netboot.xyz.kpxe

  tasks:

  # -------------------------
  # PACKAGES
  # -------------------------
  - name: Install required packages
    apt:
      name:
        - dnsmasq
        - unbound
        - apache2
        - wget
        - curl
        - tar
      state: present
      update_cache: yes
    retries: 5
    delay: 5

  # -------------------------
  # DISABLE CONFLICTING DNS
  # -------------------------
  - name: Stop systemd-resolved (avoid DNS conflict)
    systemd:
      name: systemd-resolved
      state: stopped
      enabled: false
    ignore_errors: yes

  # -------------------------
  # UNBOUND CONFIG
  # -------------------------
  - name: Configure Unbound (Primary DNS)
    copy:
      dest: /etc/unbound/unbound.conf.d/pxe.conf
      content: |
        server:
          interface: 0.0.0.0
          port: 53

          access-control: {{ dns_lan_cidr }} allow

          cache-size: 128m
          prefetch: yes

          hide-identity: yes
          hide-version: yes

        forward-zone:
          name: "."
          forward-addr: 9.9.9.9
          forward-addr: 149.112.112.112

  - name: Restart Unbound
    systemd:
      name: unbound
      state: restarted
      enabled: true

  # -------------------------
  # DHCP / PXE (dnsmasq)
  # -------------------------
  - name: Configure dnsmasq for PXE
    copy:
      dest: /etc/dnsmasq.conf
      content: |
        interface={{ interface }}
        bind-interfaces

        dhcp-range={{ dhcp_range_start }},{{ dhcp_range_end }},12h

        # Gateway
        dhcp-option=3,{{ gateway }}

        # DNS -> UNBOUND (PRIMARY DNS)
        dhcp-option=6,{{ server_ip }}

        enable-tftp
        tftp-root={{ tftp_root }}

        dhcp-boot=netboot.xyz.kpxe

  - name: Restart dnsmasq
    systemd:
      name: dnsmasq
      state: restarted
      enabled: true

  # -------------------------
  # TFTP SETUP
  # -------------------------
  - name: Create TFTP directory
    file:
      path: "{{ tftp_root }}"
      state: directory

  - name: Download netboot.xyz
    get_url:
      url: "{{ netboot_url }}"
      dest: "{{ tftp_root }}/netboot.xyz.kpxe"
    retries: 5
    delay: 3

  # -------------------------
  # WEB SERVER
  # -------------------------
  - name: Ensure Apache is running
    systemd:
      name: apache2
      state: started
      enabled: true

  # -------------------------
  # IVPENTOY INSTALL
  # -------------------------
  - name: Create iVentoy directory
    file:
      path: "{{ iventoy_dir }}"
      state: directory

  - name: Download iVentoy
    get_url:
      url: "{{ iventoy_url }}"
      dest: /tmp/iventoy.tar.gz
    retries: 5
    delay: 5

  - name: Extract iVentoy
    unarchive:
      src: /tmp/iventoy.tar.gz
      dest: /tmp/
      remote_src: yes

  - name: Copy iVentoy files
    copy:
      src: "{{ item }}"
      dest: "{{ iventoy_dir }}/"
      remote_src: yes
    with_fileglob:
      - "/tmp/iventoy-*/*"

  - name: Create ISO directory
    file:
      path: "{{ iventoy_dir }}/iso"
      state: directory

  # -------------------------
  # IVPENTOY SERVICE
  # -------------------------
  - name: Create systemd service for iVentoy
    copy:
      dest: /etc/systemd/system/iventoy.service
      content: |
        [Unit]
        Description=iVentoy PXE Server
        After=network.target

        [Service]
        ExecStart={{ iventoy_dir }}/iventoy.sh start
        ExecStop={{ iventoy_dir }}/iventoy.sh stop
        Restart=always

        [Install]
        WantedBy=multi-user.target

  - name: Reload systemd
    command: systemctl daemon-reload

  - name: Start iVentoy
    systemd:
      name: iventoy
      state: started
      enabled: true

  # -------------------------
  # HEALTH CHECK
  # -------------------------
  - name: Wait for iVentoy web UI
    uri:
      url: http://localhost:26000
      status_code: 200
    register: iventoy_check
    retries: 10
    delay: 3
    until: iventoy_check.status == 200

  # -------------------------
  # PXE iPXE CHAIN
  # -------------------------
  - name: Create iPXE chain script
    copy:
      dest: "{{ web_root }}/pxe.ipxe"
      content: |
        #!ipxe
        dhcp
        chain http://{{ server_ip }}:26000/iventoy.ipxe