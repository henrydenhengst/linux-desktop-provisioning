---
- name: FULL PXE STACK (netboot.xyz + iVentoy + DHCP + TFTP)
  hosts: pxe_server
  become: true
  gather_facts: true

  vars:
    # AUTO interface (FIX: geen eth0 meer)
    interface: "{{ ansible_default_ipv4.interface }}"

    dhcp_range_start: 192.168.1.100
    dhcp_range_end: 192.168.1.200
    router: "{{ ansible_default_ipv4.gateway }}"
    dns: 1.1.1.1

    tftp_root: /srv/tftp
    web_root: /var/www/html

    iventoy_dir: /opt/iventoy
    iventoy_iso_dir: /opt/iventoy/iso

    iventoy_url: https://github.com/ventoy/PXE/releases/latest/download/iventoy-linux-free.tar.gz
    netboot_url: https://boot.netboot.xyz/ipxe/netboot.xyz.kpxe

  tasks:

  # -------------------------
  # BASE PACKAGES
  # -------------------------
  - name: Install base packages (with retries)
    apt:
      name:
        - dnsmasq
        - apache2
        - wget
        - tar
        - curl
      state: present
      update_cache: yes
    register: apt_install
    retries: 5
    delay: 5
    until: apt_install is succeeded

  # -------------------------
  # TFTP SETUP
  # -------------------------
  - name: Create TFTP root
    file:
      path: "{{ tftp_root }}"
      state: directory
      mode: '0755'

  - name: Download netboot.xyz (with retries)
    get_url:
      url: "{{ netboot_url }}"
      dest: "{{ tftp_root }}/netboot.xyz.kpxe"
    register: netboot_download
    retries: 5
    delay: 3
    until: netboot_download is succeeded

  # -------------------------
  # DHCP CONFIG
  # -------------------------
  - name: Configure dnsmasq (PXE DHCP + TFTP)
    copy:
      dest: /etc/dnsmasq.conf
      content: |
        interface={{ interface }}
        bind-interfaces

        dhcp-range={{ dhcp_range_start }},{{ dhcp_range_end }},12h
        dhcp-option=3,{{ router }}
        dhcp-option=6,{{ dns }}

        enable-tftp
        tftp-root={{ tftp_root }}

        dhcp-boot=netboot.xyz.kpxe

  - name: Restart dnsmasq
    systemd:
      name: dnsmasq
      state: restarted
      enabled: true

  # -------------------------
  # SERVER IP DETECTION
  # -------------------------
  - name: Set server IP fact
    set_fact:
      server_ip: "{{ ansible_default_ipv4.address }}"

  # -------------------------
  # IVPENTOY INSTALL
  # -------------------------
  - name: Create iVentoy directory
    file:
      path: "{{ iventoy_dir }}"
      state: directory

  - name: Download iVentoy (with retries)
    get_url:
      url: "{{ iventoy_url }}"
      dest: /tmp/iventoy.tar.gz
    register: iventoy_dl
    retries: 5
    delay: 5
    until: iventoy_dl is succeeded

  - name: Extract iVentoy
    unarchive:
      src: /tmp/iventoy.tar.gz
      dest: /tmp/
      remote_src: yes

  - name: Copy iVentoy files
    copy:
      src: "{{ item }}"
      dest: "{{ iventoy_dir }}/"
      remote_src: yes
    with_fileglob:
      - "/tmp/iventoy-*/*"

  - name: Create ISO directory
    file:
      path: "{{ iventoy_iso_dir }}"
      state: directory

  # -------------------------
  # IVPENTOY SERVICE
  # -------------------------
  - name: Create systemd service for iVentoy
    copy:
      dest: /etc/systemd/system/iventoy.service
      content: |
        [Unit]
        Description=iVentoy PXE Server
        After=network.target

        [Service]
        ExecStart={{ iventoy_dir }}/iventoy.sh start
        ExecStop={{ iventoy_dir }}/iventoy.sh stop
        Restart=always

        [Install]
        WantedBy=multi-user.target

  - name: Reload systemd
    command: systemctl daemon-reload

  - name: Start iVentoy service
    systemd:
      name: iventoy
      state: started
      enabled: true

  # -------------------------
  # HEALTH CHECK (FIXED)
  # -------------------------
  - name: Wait for iVentoy web UI (health check)
    uri:
      url: http://localhost:26000
      status_code: 200
    register: iventoy_check
    retries: 10
    delay: 3
    until: iventoy_check.status == 200

  # -------------------------
  # IPXE CHAIN SCRIPT
  # -------------------------
  - name: Create iPXE chain script
    copy:
      dest: "{{ web_root }}/iventoy.ipxe"
      content: |
        #!ipxe
        dhcp
        chain http://{{ server_ip }}:26000/iventoy.ipxe

  # -------------------------
  # APACHE
  # -------------------------
  - name: Ensure Apache running
    systemd:
      name: apache2
      state: started
      enabled: true