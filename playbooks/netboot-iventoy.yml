---
- name: PXE STACK (NETBOOT+ IVENTOY)
  hosts: pxe_server
  become: true
  gather_facts: true

  vars:
    interface: "{{ ansible_default_ipv4.interface }}"
    server_ip: "{{ ansible_default_ipv4.address }}"
    gateway: "{{ ansible_default_ipv4.gateway }}"

    lan_cidr: 192.168.1.0/24
    dhcp_range_start: 192.168.1.100
    dhcp_range_end: 192.168.1.200

    tftp_root: /srv/tftp
    web_root: /var/www/html

    iventoy_dir: /opt/iventoy
    iventoy_url: https://github.com/ventoy/PXE/releases/latest/download/iventoy-linux-free.tar.gz
    netboot_kpxe: https://boot.netboot.xyz/ipxe/netboot.xyz.kpxe
    netboot_efi: https://boot.netboot.xyz/ipxe/netboot.xyz.efi

  # -------------------------
  # PACKAGES (RESILIENT)
  # -------------------------
  tasks:

  - name: Install dependencies
    apt:
      name:
        - dnsmasq
        - unbound
        - nginx
        - wget
        - curl
        - tar
        - ufw
        - ipxe
      state: present
      update_cache: yes
    retries: 10
    delay: 5

  # -------------------------
  # DNS FIX (CRITICAL)
  # -------------------------
  - name: Disable systemd-resolved
    systemd:
      name: systemd-resolved
      state: stopped
      enabled: false
    ignore_errors: true

  - name: Force resolv.conf
    copy:
      dest: /etc/resolv.conf
      content: |
        nameserver 127.0.0.1

  # -------------------------
  # FIREWALL SAFE MODE
  # -------------------------
  - name: Enable UFW safe baseline
    ufw:
      state: enabled
      policy: deny

  - name: Allow required PXE ports
    ufw:
      rule: allow
      port: "{{ item.port }}"
      proto: "{{ item.proto }}"
    loop:
      - { port: "53", proto: "udp" }
      - { port: "53", proto: "tcp" }
      - { port: "67", proto: "udp" }
      - { port: "69", proto: "udp" }
      - { port: "80", proto: "tcp" }
      - { port: "26000", proto: "tcp" }

  # -------------------------
  # UNBOUND (HARDENED + STABLE)
  # -------------------------
  - name: Configure Unbound
    copy:
      dest: /etc/unbound/unbound.conf.d/pxe.conf
      content: |
        server:
          interface: 127.0.0.1
          port: 53

          access-control: 127.0.0.0/8 allow
          access-control: {{ lan_cidr }} allow

          prefetch: yes
          cache-size: 256m

          hide-identity: yes
          hide-version: yes

        forward-zone:
          name: "."
          forward-addr: 1.1.1.1
          forward-addr: 9.9.9.9

  - name: Restart Unbound (must be ready first)
    systemd:
      name: unbound
      state: restarted
      enabled: true

  - name: Wait for DNS port
    wait_for:
      port: 53
      host: 127.0.0.1
      timeout: 30

  # -------------------------
  # DNSMASQ (BIOS + UEFI FIXED)
  # -------------------------
  - name: Configure dnsmasq PXE dual boot
    copy:
      dest: /etc/dnsmasq.conf
      content: |
        interface={{ interface }}
        bind-interfaces

        dhcp-range={{ dhcp_range_start }},{{ dhcp_range_end }},12h
        dhcp-option=3,{{ gateway }}

        dhcp-option=6,{{ server_ip }}

        enable-tftp
        tftp-root={{ tftp_root }}

        # BIOS / UEFI detection
        dhcp-match=set:bios,option:client-arch,0
        dhcp-match=set:uefi64,option:client-arch,7

        # BIOS boot
        dhcp-boot=tag:bios,netboot.xyz.kpxe

        # UEFI boot
        dhcp-boot=tag:uefi64,netboot.xyz.efi

        # fallback
        dhcp-boot=netboot.xyz.kpxe

  - name: Restart dnsmasq
    systemd:
      name: dnsmasq
      state: restarted
      enabled: true

  - name: Wait for DHCP service
    wait_for:
      port: 67
      delay: 2
      timeout: 30

  # -------------------------
  # TFTP + NETBOOT FILES
  # -------------------------
  - name: Create TFTP directory
    file:
      path: "{{ tftp_root }}"
      state: directory

  - name: Download netboot BIOS
    get_url:
      url: "{{ netboot_kpxe }}"
      dest: "{{ tftp_root }}/netboot.xyz.kpxe"
    retries: 10
    delay: 5

  - name: Download netboot UEFI
    get_url:
      url: "{{ netboot_efi }}"
      dest: "{{ tftp_root }}/netboot.xyz.efi"
    retries: 10
    delay: 5

  # -------------------------
  # NGINX SAFE CONFIG
  # -------------------------
  - name: Create web root
    file:
      path: "{{ web_root }}"
      state: directory

  - name: Configure Nginx PXE
    copy:
      dest: /etc/nginx/sites-available/pxe
      content: |
        server {
          listen 80;
          root /var/www/html;

          index index.html pxe.ipxe;

          location / {
            autoindex on;
          }

          location ~* \.ipxe$ {
            default_type text/plain;
          }
        }

  - name: Enable Nginx site
    file:
      src: /etc/nginx/sites-available/pxe
      dest: /etc/nginx/sites-enabled/pxe
      state: link

  - name: Remove default site
    file:
      path: /etc/nginx/sites-enabled/default
      state: absent

  - name: Restart Nginx
    systemd:
      name: nginx
      state: restarted
      enabled: true

  # -------------------------
  # PXE MENU (ROBUST)
  # -------------------------
  - name: Create PXE menu
    copy:
      dest: "{{ web_root }}/pxe.ipxe"
      content: |
        #!ipxe
        dhcp
        menu PXE MENU
        item netboot Netboot.xyz
        item iventoy iVentoy
        choose target

        goto ${target}

        :netboot
        chain http://boot.netboot.xyz/ipxe/netboot.xyz.kpxe

        :iventoy
        chain http://{{ server_ip }}:26000/iventoy.ipxe

  # -------------------------
  # IVPENTOY SAFE INSTALL
  # -------------------------
  - name: Create iVentoy dir
    file:
      path: "{{ iventoy_dir }}"
      state: directory

  - name: Download iVentoy
    get_url:
      url: "{{ iventoy_url }}"
      dest: /tmp/iventoy.tar.gz
    retries: 10
    delay: 5

  - name: Extract iVentoy
    unarchive:
      src: /tmp/iventoy.tar.gz
      dest: /tmp/
      remote_src: yes

  - name: Copy iVentoy files safely
    shell: |
      cp -r /tmp/iventoy-*/* {{ iventoy_dir }}/
    args:
      creates: "{{ iventoy_dir }}/iventoy.sh"

  - name: Fix permissions
    file:
      path: "{{ iventoy_dir }}/iventoy.sh"
      mode: "0755"

  # -------------------------
  # IVPENTOY SERVICE
  # -------------------------
  - name: systemd service
    copy:
      dest: /etc/systemd/system/iventoy.service
      content: |
        [Unit]
        Description=iVentoy
        After=network-online.target
        Wants=network-online.target

        [Service]
        ExecStart={{ iventoy_dir }}/iventoy.sh start
        Restart=always

        [Install]
        WantedBy=multi-user.target

  - name: Reload systemd
    command: systemctl daemon-reload

  - name: Start iVentoy
    systemd:
      name: iventoy
      state: started
      enabled: true

  - name: Wait for iVentoy HTTP
    uri:
      url: http://localhost:26000
      status_code: 200
    retries: 20
    delay: 3