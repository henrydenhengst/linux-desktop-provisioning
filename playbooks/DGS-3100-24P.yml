- name: DGS-3100-24P Full Provision with Firmware
  hosts: localhost
  gather_facts: no

  vars:
    switch_ip: 10.90.90.90
    username: admin
    passwords:
      - ""
      - "admin"
    tftp_server: 10.90.90.10        # IP van TFTP server
    firmware_url: "https://support.dlink.com/resource/PRODUCTS/DGS-3100-24/REVA/DGS-3100-24_FIRMWARE_3.60.28.ZIP"
    firmware_file: "dgs_31xx_gen-36028.ros"   # uitgepakt uit ZIP, CLI-bestand
    config_commands: |
      create vlan CLIENTS tag 10
      create vlan SERVERS tag 20
      create vlan IPMI tag 30
      create vlan MGMT tag 40
      create vlan UPLINK tag 50

      config vlan CLIENTS add untagged 1-10
      config vlan SERVERS add untagged 23
      config vlan IPMI add untagged 22
      config vlan MGMT add untagged 21
      config vlan UPLINK add untagged 24

      config vlan default delete 1-24
      config ports 11-20 state disable

  tasks:

  # 1️⃣ Download firmware naar TFTP server
  - name: Download firmware via get_url
    ansible.builtin.get_url:
      url: "{{ firmware_url }}"
      dest: "/tmp/{{ firmware_file }}.zip"
      mode: '0644'

  - name: Unzip firmware for TFTP
    ansible.builtin.unarchive:
      src: "/tmp/{{ firmware_file }}.zip"
      dest: "/tmp"
      remote_src: yes

  # 2️⃣ Wacht tot switch bereikbaar is via Telnet
  - name: Wait for switch telnet
    ansible.builtin.wait_for:
      host: "{{ switch_ip }}"
      port: 23
      timeout: 60

  # 3️⃣ Login via Telnet (fallback passwords)
  - name: Determine working password
    block:
      - name: Attempt login
        ansible.builtin.expect:
          command: telnet {{ switch_ip }}
          timeout: 20
          responses:
            "UserName:": "{{ username }}\n"
            "PassWord:": "{{ item }}\n"
            ">": "enable\n"
        register: login_attempt
        failed_when: "'Login incorrect' in login_attempt.stdout"
        loop: "{{ passwords }}"
        loop_control:
          label: "{{ item | default('empty') }}"
        ignore_errors: yes

      - name: Set working password
        set_fact:
          working_password: "{{ item.item }}"
        when: item is not failed
        loop: "{{ login_attempt.results }}"

      - name: Fail if no valid password found
        ansible.builtin.fail:
          msg: "Geen werkende login gevonden"
        when: working_password is not defined

  # 4️⃣ Firmware upload via CLI
  - name: Upload firmware via Telnet
    ansible.builtin.expect:
      command: telnet {{ switch_ip }}
      timeout: 120
      responses:
        "UserName:": "{{ username }}\n"
        "PassWord:": "{{ working_password }}\n"
        ">": "enable\n"
        "#": "download firmware {{ tftp_server }} {{ firmware_file }}\n"
        "#": "reboot\n"
        "Are you sure you want to continue? (Y/N)": "Y\n"

  # 5️⃣ Wacht tot switch terug is
  - name: Wait for switch reboot
    ansible.builtin.wait_for:
      host: "{{ switch_ip }}"
      port: 23
      timeout: 180

  # 6️⃣ Post-firmware VLAN + poort config
  - name: Apply VLAN and port configuration
    ansible.builtin.expect:
      command: telnet {{ switch_ip }}
      timeout: 60
      responses:
        "UserName:": "{{ username }}\n"
        "PassWord:": "{{ working_password }}\n"
        ">": "enable\n"
        "#": "configure\n"
        "\\(config\\)#": "{{ config_commands }}\nexit\n"
        "#": "save\n"

  # 7️⃣ Telnet uitzetten voor security
  - name: Disable telnet after provisioning
    ansible.builtin.expect:
      command: telnet {{ switch_ip }}
      timeout: 20
      responses:
        "UserName:": "{{ username }}\n"
        "PassWord:": "{{ working_password }}\n"
        ">": "enable\n"
        "#": "disable telnet\n"
        "#": "save\n"

  # 8️⃣ Optioneel: controleer HTTPS / SSH intern
  - name: Verify HTTPS enabled (optional)
    ansible.builtin.wait_for:
      host: "{{ switch_ip }}"
      port: 443
      timeout: 30
      state: started