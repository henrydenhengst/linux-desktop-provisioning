- name: DGS-3100-24P Post-Firmware Provisioning
  hosts: localhost
  gather_facts: no

  vars:
    switch_ip: 10.90.90.90          # IP na firmware upgrade of console setup
    username: admin
    passwords:
      - ""
      - "admin"
    config_commands: |
      # VLANs
      create vlan CLIENTS tag 10
      create vlan SERVERS tag 20
      create vlan IPMI tag 30
      create vlan MGMT tag 40
      create vlan UPLINK tag 50

      config vlan CLIENTS add untagged 1-10
      config vlan SERVERS add untagged 23
      config vlan IPMI add untagged 22
      config vlan MGMT add untagged 21
      config vlan UPLINK add untagged 24

      config vlan default delete 1-24
      config ports 11-20 state disable

      # Netwerk instellingen
      config ipif system vlan MGMT 192.168.100.254 255.255.255.0
      config ipif default-gateway 192.168.100.1
      config ipif dns 9.9.9.9 1.1.1.1 8.8.8.8

  tasks:

  # 1️⃣ Wacht tot switch bereikbaar is via Telnet
  - name: Wait for switch telnet
    ansible.builtin.wait_for:
      host: "{{ switch_ip }}"
      port: 23
      timeout: 60

  # 2️⃣ Login via Telnet (fallback passwords)
  - name: Determine working password
    block:
      - name: Attempt login
        ansible.builtin.expect:
          command: telnet {{ switch_ip }}
          timeout: 20
          responses:
            "UserName:": "{{ username }}\n"
            "PassWord:": "{{ item }}\n"
            ">": "enable\n"
        register: login_attempt
        failed_when: "'Login incorrect' in login_attempt.stdout"
        loop: "{{ passwords }}"
        loop_control:
          label: "{{ item | default('empty') }}"
        ignore_errors: yes

      - name: Set working password
        set_fact:
          working_password: "{{ item.item }}"
        when: item is not failed
        loop: "{{ login_attempt.results }}"

      - name: Fail if no valid password found
        ansible.builtin.fail:
          msg: "Geen werkende login gevonden"
        when: working_password is not defined

  # 3️⃣ VLAN + poorten + netwerk configuratie
  - name: Apply VLAN, ports and network configuration
    ansible.builtin.expect:
      command: telnet {{ switch_ip }}
      timeout: 60
      responses:
        "UserName:": "{{ username }}\n"
        "PassWord:": "{{ working_password }}\n"
        ">": "enable\n"
        "#": "configure\n"
        "\\(config\\)#": "{{ config_commands }}\nexit\n"
        "#": "save\n"

  # 4️⃣ Telnet uitschakelen
  - name: Disable telnet after provisioning
    ansible.builtin.expect:
      command: telnet {{ switch_ip }}
      timeout: 20
      responses:
        "UserName:": "{{ username }}\n"
        "PassWord:": "{{ working_password }}\n"
        ">": "enable\n"
        "#": "disable telnet\n"
        "#": "save\n"