---
- name: "Henry's Master Linux Provisioning"
  hosts: localhost
  connection: local
  become: yes
  vars:
    font_size: 11
    font_name: "JetBrainsMono Nerd Font"

  tasks:
    # Altijd de basis regelen (Fonts, Micro, Eza, etc.)
    - name: "Laden van Core Systeem"
      ansible.builtin.import_tasks: tasks/core.yml
      tags: [always, core]

    # Alleen uitvoeren als specifiek gevraagd (of altijd voor jouw eigen bak)
    - name: "Laden van Silent Boot"
      ansible.builtin.import_tasks: tasks/grub_silent.yml
      tags: boot

    - name: "Laden van AI Copilot"
      ansible.builtin.import_tasks: tasks/ai_stack.yml
      tags: ai

    - name: "Laden van Media/YouTuber Stack"
      ansible.builtin.import_tasks: tasks/media_stack.yml
      tags: media

  handlers:
    - name: Update GRUB
      ansible.builtin.command: "{{ 'update-grub' if ansible_os_family == 'Debian' else 'grub-mkconfig -o /boot/grub/grub.cfg' }}"
